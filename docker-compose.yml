services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: happypause
      POSTGRES_PASSWORD: happypause_dev
      POSTGRES_DB: happypause
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U happypause -d happypause"]
      interval: 2s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: ${DOCKERHUB_USERNAME:-mobileappslabs2}/happypausetime:latest
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://happypause:happypause_dev@postgres:5432/happypause
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      PORT: 3000
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      APPLE_CLIENT_ID: ${APPLE_CLIENT_ID:-}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
