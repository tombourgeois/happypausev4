<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>Settings with Timer Durations</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#b1b7a2",
                        "background-dark": "#36333a",
                        "panel-dark": "#3e3b42",
                        "field-dark": "#444148",
                        "border-dark": "#504d54",
                        "text-offwhite": "#f5f5f5",
                        "text-muted": "#b1b7a2"
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        @layer base {
            body {
                @apply bg-background-dark text-text-offwhite font-display antialiased;
                font-family: 'Manrope', sans-serif;
            }
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            @apply bg-border-dark/50 rounded-full;
        }
        .custom-select {
            appearance: none;
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%23b1b7a2' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
            background-position: right 1rem center;
            background-repeat: no-repeat;
            background-size: 1.5em 1.5em;
        }
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="min-h-screen bg-background-dark">
<div class="flex flex-col min-h-screen w-full bg-background-dark relative overflow-x-hidden">
<header class="grid grid-cols-3 items-center px-4 pt-14 pb-4 bg-background-dark/80 backdrop-blur-md sticky top-0 z-30 border-b border-border-dark/20">
<div class="flex justify-start">
<button class="w-10 h-10 flex items-center justify-center rounded-full bg-white/5 hover:bg-white/10 active:scale-90 transition-all">
<span class="material-symbols-outlined text-2xl text-primary">arrow_back_ios_new</span>
</button>
</div>
<h1 class="text-xl font-bold tracking-tight text-center whitespace-nowrap text-text-offwhite">Settings</h1>
<div class="w-10"></div>
</header>
<main class="flex-1 px-6 py-6 space-y-10 pb-12">
<section class="space-y-4">
<div class="flex items-center gap-2 px-1">
<span class="material-symbols-outlined text-primary text-xl">notifications</span>
<h2 class="text-xs font-bold uppercase tracking-[0.15em] text-primary">Ringtone</h2>
</div>
<div class="relative group">
<select class="custom-select w-full bg-field-dark border border-border-dark/50 text-text-offwhite rounded-2xl py-4 px-5 focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all outline-none text-base">
<option value="zen">Zen Chime (Default)</option>
<option value="forest">Forest Morning</option>
<option value="digital">Digital Pulse</option>
<option value="crystal">Crystal Bowl</option>
<option value="waves">Ocean Waves</option>
</select>
</div>
</section>
<section class="space-y-4">
<div class="flex items-center gap-2 px-1">
<span class="material-symbols-outlined text-primary text-xl">category</span>
<h2 class="text-xs font-bold uppercase tracking-[0.15em] text-primary">Visible Categories</h2>
</div>
<div class="bg-field-dark/30 rounded-2xl overflow-hidden border border-border-dark/30 divide-y divide-border-dark/20">
<label class="flex items-center justify-between p-4 cursor-pointer hover:bg-white/5 active:bg-white/10 transition-colors">
<div class="flex items-center gap-4">
<div class="w-11 h-11 rounded-full bg-primary/10 flex items-center justify-center">
<span class="material-symbols-outlined text-primary">fitness_center</span>
</div>
<span class="text-base font-medium text-text-offwhite">Fitness</span>
</div>
<input checked="" class="h-6 w-6 rounded-full border-border-dark bg-transparent text-primary focus:ring-primary focus:ring-offset-0 focus:ring-offset-transparent transition-all cursor-pointer" type="checkbox"/>
</label>
<label class="flex items-center justify-between p-4 cursor-pointer hover:bg-white/5 active:bg-white/10 transition-colors">
<div class="flex items-center gap-4">
<div class="w-11 h-11 rounded-full bg-primary/10 flex items-center justify-center">
<span class="material-symbols-outlined text-primary">potted_plant</span>
</div>
<span class="text-base font-medium text-text-offwhite">Leisure</span>
</div>
<input class="h-6 w-6 rounded-full border-border-dark bg-transparent text-primary focus:ring-primary transition-all cursor-pointer" type="checkbox"/>
</label>
<label class="flex items-center justify-between p-4 cursor-pointer hover:bg-white/5 active:bg-white/10 transition-colors">
<div class="flex items-center gap-4">
<div class="w-11 h-11 rounded-full bg-primary/10 flex items-center justify-center">
<span class="material-symbols-outlined text-primary">groups</span>
</div>
<span class="text-base font-medium text-text-offwhite">Social</span>
</div>
<input checked="" class="h-6 w-6 rounded-full border-border-dark bg-transparent text-primary focus:ring-primary transition-all cursor-pointer" type="checkbox"/>
</label>
<label class="flex items-center justify-between p-4 cursor-pointer hover:bg-white/5 active:bg-white/10 transition-colors">
<div class="flex items-center gap-4">
<div class="w-11 h-11 rounded-full bg-primary/10 flex items-center justify-center">
<span class="material-symbols-outlined text-primary">psychology</span>
</div>
<span class="text-base font-medium text-text-offwhite">Mind</span>
</div>
<input checked="" class="h-6 w-6 rounded-full border-border-dark bg-transparent text-primary focus:ring-primary transition-all cursor-pointer" type="checkbox"/>
</label>
<label class="flex items-center justify-between p-4 cursor-pointer hover:bg-white/5 active:bg-white/10 transition-colors">
<div class="flex items-center gap-4">
<div class="w-11 h-11 rounded-full bg-primary/10 flex items-center justify-center">
<span class="material-symbols-outlined text-primary">self_improvement</span>
</div>
<span class="text-base font-medium text-text-offwhite">Spiritual</span>
</div>
<input class="h-6 w-6 rounded-full border-border-dark bg-transparent text-primary focus:ring-primary transition-all cursor-pointer" type="checkbox"/>
</label>
<label class="flex items-center justify-between p-4 cursor-pointer hover:bg-white/5 active:bg-white/10 transition-colors">
<div class="flex items-center gap-4">
<div class="w-11 h-11 rounded-full bg-primary/10 flex items-center justify-center">
<span class="material-symbols-outlined text-primary">spa</span>
</div>
<span class="text-base font-medium text-text-offwhite">Relaxation</span>
</div>
<input checked="" class="h-6 w-6 rounded-full border-border-dark bg-transparent text-primary focus:ring-primary transition-all cursor-pointer" type="checkbox"/>
</label>
</div>
</section>
<section class="space-y-4">
<div class="flex items-center gap-2 px-1">
<span class="material-symbols-outlined text-primary text-xl">timer</span>
<h2 class="text-xs font-bold uppercase tracking-[0.15em] text-primary">Focus Session Time</h2>
</div>
<div class="relative flex items-center">
<input class="w-full bg-field-dark border border-border-dark/50 text-text-offwhite rounded-2xl py-4 px-5 focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all outline-none text-base pr-16" type="number" value="55"/>
<span class="absolute right-5 text-text-muted font-medium pointer-events-none">min</span>
</div>
</section>
<section class="space-y-4">
<div class="flex items-center gap-2 px-1">
<span class="material-symbols-outlined text-primary text-xl">coffee</span>
<h2 class="text-xs font-bold uppercase tracking-[0.15em] text-primary">HappyPause Time</h2>
</div>
<div class="relative flex items-center">
<input class="w-full bg-field-dark border border-border-dark/50 text-text-offwhite rounded-2xl py-4 px-5 focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all outline-none text-base pr-16" type="number" value="5"/>
<span class="absolute right-5 text-text-muted font-medium pointer-events-none">min</span>
</div>
</section>
<footer class="pt-6 pb-8 space-y-6">
<button class="w-full bg-primary hover:brightness-110 active:scale-[0.98] text-background-dark font-bold py-5 rounded-2xl transition-all shadow-[0_0_30px_rgba(177,183,162,0.15)] text-lg">
                    Save Changes
                </button>
<p class="text-center text-[10px] text-primary/60 font-bold uppercase tracking-[0.3em]">
                    Configuration v1.4.2
                </p>
</footer>
</main>
<div class="fixed -bottom-24 -right-24 w-80 h-80 bg-primary/5 rounded-full blur-[100px] pointer-events-none -z-10"></div>
<div class="fixed -top-24 -left-24 w-80 h-80 bg-primary/5 rounded-full blur-[100px] pointer-events-none -z-10"></div>
</div>

</body></html>
