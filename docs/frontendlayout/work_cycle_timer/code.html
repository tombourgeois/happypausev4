<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Zen Work Cycle Timer</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#b1b7a2",
                        "background-charcoal": "#36333a",
                        "off-white": "#f5f5f5",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        @layer base {
            body {
                font-family: 'Manrope', sans-serif;
                -webkit-font-smoothing: antialiased;
                background-color: #36333a;
                color: #f5f5f5;
            }
        }
        .timer-ring {
            transform: rotate(-90deg);
        }
        body {
            min-height: 100dvh;
        }
    </style>
<style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-charcoal text-off-white font-display flex flex-col h-screen overflow-hidden">
<header class="w-full flex items-center justify-between px-6 h-16 shrink-0 border-b border-white/5 bg-background-charcoal z-20">
<div class="flex items-center gap-3">
<div class="w-10 h-10 bg-white flex flex-col items-center justify-center rounded-sm shrink-0">
<span class="text-[8px] font-bold text-background-charcoal leading-none">Logo.png</span>
<span class="text-[6px] text-background-charcoal/60 mt-0.5">40x40</span>
</div>
<h1 class="text-base font-bold tracking-tight text-off-white/90">HappyPause</h1>
</div>
<button class="w-10 h-10 flex items-center justify-center text-off-white/60 hover:text-off-white transition-colors">
<span class="material-symbols-outlined text-2xl">settings</span>
</button>
</header>
<main class="flex-1 flex flex-col items-center justify-center px-4 relative">
<div class="flex flex-col items-center w-full max-w-[340px]">
<div class="relative w-full aspect-square flex items-center justify-center">
<div class="absolute inset-8 rounded-full bg-primary/10 blur-[80px] opacity-40"></div>
<svg class="w-full h-full timer-ring">
<circle class="text-off-white/10" cx="50%" cy="50%" fill="transparent" r="48%" stroke="currentColor" stroke-width="6"></circle>
<circle class="text-primary" cx="50%" cy="50%" fill="transparent" r="48%" stroke="currentColor" stroke-dasharray="1000 1000" stroke-dashoffset="250" stroke-linecap="round" stroke-width="6"></circle>
</svg>
<div class="absolute inset-0 flex flex-col items-center justify-center text-center p-8">
<span class="px-3 py-1 rounded-full bg-primary/10 border border-primary/20 text-primary text-[10px] font-bold uppercase tracking-widest mb-1">
                        Focus Session
                    </span>
<p class="text-off-white/40 text-[11px] font-medium mb-4">Ends at 10:45 AM</p>
<span class="text-7xl font-extrabold tracking-tighter tabular-nums text-off-white drop-shadow-[0_0_20px_rgba(177,183,162,0.2)] leading-none">
                        55:00
                    </span>
<span class="text-off-white/40 text-[10px] font-bold uppercase tracking-[0.3em] mt-3 mb-6">
                        Until break
                    </span>
<button class="bg-off-white/10 hover:bg-off-white/15 border border-off-white/10 text-off-white px-5 py-2.5 rounded-full text-[11px] font-bold tracking-wider transition-all active:scale-95 flex items-center gap-2">
<div class="w-5 h-5 text-primary">
<svg class="w-full h-full fill-current" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
<circle cx="50" cy="55" fill="none" r="35" stroke="currentColor" stroke-width="6"></circle>
<rect fill="currentColor" height="18" rx="2" width="6" x="42" y="42"></rect>
<rect fill="currentColor" height="18" rx="2" width="6" x="52" y="42"></rect>
<path d="M38 72 Q50 82 62 72" fill="none" stroke="currentColor" stroke-linecap="round" stroke-width="6"></path>
<g transform="translate(5, 45) scale(0.7)">
<circle cx="15" cy="15" fill="none" r="10" stroke="currentColor" stroke-width="8"></circle>
</g>
</svg>
</div>
                        Have a HappyPause
                    </button>
</div>
</div>
<div class="flex items-center justify-center gap-8 mt-12">
<button class="w-16 h-16 rounded-full border border-off-white/10 bg-off-white/5 flex items-center justify-center group hover:bg-off-white/10 transition-all">
<span class="material-symbols-outlined text-off-white/80 group-hover:scale-110 transition-transform">stop</span>
</button>
<button class="w-20 h-20 rounded-full bg-primary flex items-center justify-center shadow-[0_0_40px_rgba(177,183,162,0.4)] hover:scale-105 active:scale-95 transition-all">
<span class="material-symbols-outlined text-background-charcoal text-4xl font-bold fill-1">pause</span>
</button>
<button class="w-16 h-16 rounded-full border border-off-white/10 bg-off-white/5 flex items-center justify-center group hover:bg-off-white/10 transition-all">
<span class="material-symbols-outlined text-off-white/80 group-hover:scale-110 transition-transform">replay</span>
</button>
</div>
</div>
</main>
<footer class="pb-8 px-6 shrink-0 z-10">
<nav class="bg-off-white/5 border border-off-white/5 rounded-full px-2 py-2 flex items-center justify-around max-w-sm mx-auto backdrop-blur-xl">
<a class="flex flex-col items-center justify-center gap-1 w-16 py-2 rounded-full bg-primary text-background-charcoal shadow-lg" href="#">
<span class="material-symbols-outlined fill-1">timer</span>
<span class="text-[10px] font-bold">Timer</span>
</a>
<a class="flex flex-col items-center justify-center gap-1 w-16 py-2 text-off-white/40 hover:text-off-white transition-colors" href="#">
<span class="material-symbols-outlined">bar_chart</span>
<span class="text-[10px] font-bold">Stats</span>
</a>
<a class="flex flex-col items-center justify-center gap-1 w-16 py-2 text-off-white/40 hover:text-off-white transition-colors" href="#">
<span class="material-symbols-outlined">history</span>
<span class="text-[10px] font-bold">History</span>
</a>
<a class="flex flex-col items-center justify-center gap-1 w-16 py-2 text-off-white/40 hover:text-off-white transition-colors" href="#">
<span class="material-symbols-outlined">person</span>
<span class="text-[10px] font-bold">Profile</span>
</a>
</nav>
</footer>

</body></html>
