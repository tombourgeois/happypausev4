<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>HappyPause Sign Up</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>

        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#abec13",
                        "background-dark": "#36333a",
                        "zen-accent": "#b1b7a2",
                        "zen-text": "#f5f5f5",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]

                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",

                },

<style type="text/tailwindcss">
        body {
            font-family: 'Manrope', sans-serif;
            -webkit-tap-highlight-color: transparent;
            min-height: 100dvh;
        }
    </style>
<style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);

<body class="bg-background-dark text-zen-text min-h-screen flex flex-col items-center p-6">
<div class="w-full max-w-sm flex flex-col items-center pt-8 mb-8">
<div class="w-[96px] h-[96px] bg-white flex flex-col items-center justify-center mb-4 rounded-lg shadow-lg">
<span class="text-zinc-900 font-bold text-xs">Logo.png</span>
<span class="text-zinc-500 text-[9px] mt-1 tracking-wider uppercase">96x96px</span>
</div>
<h1 class="text-2xl font-bold tracking-tight text-zen-text">Join HappyPause</h1>
</div>
<div class="w-full max-w-sm space-y-5 flex-1">
<div class="space-y-4">
<div class="flex flex-col gap-1.5">
<label class="text-sm font-medium text-zen-text ml-1">Email Address</label>
<input class="w-full h-12 bg-[#444148] border-none rounded-xl px-4 text-zen-text placeholder:text-zen-accent/40 focus:ring-2 focus:ring-zen-accent/50 transition-all" placeholder="name@example.com" type="email"/>
</div>
<div class="flex flex-col gap-1.5">
<label class="text-sm font-medium text-zen-text ml-1">Password</label>
<input class="w-full h-12 bg-[#444148] border-none rounded-xl px-4 text-zen-text placeholder:text-zen-accent/40 focus:ring-2 focus:ring-zen-accent/50 transition-all" placeholder="••••••••" type="password"/>
</div>
<div class="flex flex-col gap-1.5">
<label class="text-sm font-medium text-zen-text ml-1">Confirm Password</label>
<input class="w-full h-12 bg-[#444148] border-none rounded-xl px-4 text-zen-text placeholder:text-zen-accent/40 focus:ring-2 focus:ring-zen-accent/50 transition-all" placeholder="••••••••" type="password"/>
</div>
<div class="flex flex-col gap-1.5">
<label class="text-sm font-medium text-zen-text ml-1">(Optional) Phone Number</label>
<input class="w-full h-12 bg-[#444148] border-none rounded-xl px-4 text-zen-text placeholder:text-zen-accent/40 focus:ring-2 focus:ring-zen-accent/50 transition-all" placeholder="+1 (555) 000-0000" type="tel"/>
</div>
</div>
<button class="w-full h-14 bg-[#b1b7a2] text-[#36333a] font-bold text-lg rounded-xl shadow-lg shadow-black/20 hover:opacity-95 active:scale-[0.98] transition-all mt-4">
            Create Account
        </button>
<div class="flex items-center gap-4 py-4">
<div class="h-[1px] flex-1 bg-zen-accent/20"></div>
<span class="text-xs font-semibold text-zen-accent/60 uppercase tracking-widest whitespace-nowrap">Sign up with:</span>
<div class="h-[1px] flex-1 bg-zen-accent/20"></div>
</div>
<div class="grid grid-cols-2 gap-3">
<button class="flex items-center justify-center gap-2 w-full h-12 bg-white text-gray-700 font-semibold rounded-xl border border-gray-200 hover:bg-gray-50 transition-colors">
<svg class="w-5 h-5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>

<path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 12-4.53z" fill="#EA4335"></path>
</svg>
<span class="text-sm">Google</span>
</button>
<button class="flex items-center justify-center gap-2 w-full h-12 bg-black text-white font-semibold rounded-xl hover:bg-zinc-900 transition-colors">
<svg class="w-5 h-5 fill-current" viewBox="0 0 384 512" xmlns="http://www.w3.org/2000/svg">
<path d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 21.8-88.5 21.8-11.4 0-51.1-20.8-83.6-20.8-42.3 0-82.7 24.3-104.7 62.7-45.4 79-11.6 190.3 33.4 254.4 21 30.1 46.1 63.6 77.3 62.4 31.3-1.2 43.2-20.3 81.4-20.3 38.2 0 49.1 20.3 81.9 19.7 33.4-.6 54.7-30.5 75.9-61.2 24.2-35.1 34.2-69 34.4-70.7-1.1-.3-66.3-24.7-66.7-101zM285.2 79.9c15.5-18.9 25.5-45.1 22.6-71.1-22.1 1.1-48.8 15.1-64.6 33.5-14.3 16.6-26.7 43.1-23.4 68.7 24.1 1.8 49.2-12.2 65.4-31.1z"></path>
</svg>
<span class="text-sm">Apple</span>
</button>
</div>
</div>
<div class="w-full max-w-sm pt-8 pb-4">
<div class="text-center">
<p class="text-zen-accent text-sm">
                Already have an account? 
                <button class="text-[#abec13] font-bold ml-1 hover:underline">Log In</button>
</p>
</div>
</div>
<div class="fixed top-[-10%] left-[-10%] w-64 h-64 bg-zen-accent/5 rounded-full blur-[80px] pointer-events-none"></div>
<div class="fixed bottom-[-5%] right-[-5%] w-80 h-80 bg-[#abec13]/5 rounded-full blur-[100px] pointer-events-none"></div>

</body></html>
