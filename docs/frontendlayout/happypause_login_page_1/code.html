<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>HappyPause Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary-sage": "#b1b7a2",
                        "vibrant-green": "#abec13",
                        "background-dark": "#36333a",
                        "zen-accent": "#b1b7a2",
                        "zen-text": "#f5f5f5",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1.25rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        body {
            font-family: 'Manrope', sans-serif;
            -webkit-tap-highlight-color: transparent;
            min-height: max(884px, 100dvh);
        }
    </style>
<style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-dark text-zen-text min-h-screen flex flex-col items-center justify-between p-6">
<div class="w-full max-w-sm flex flex-col items-center pt-12">
<div class="mb-6">
<div class="w-24 h-24 bg-white flex flex-col items-center justify-center text-black rounded-2xl shadow-lg">
<span class="text-xs font-bold">Logo.png</span>
<span class="text-[10px] opacity-60">96x96 px</span>
</div>
</div>
<h1 class="text-3xl font-bold tracking-tight text-zen-text mb-2">HappyPause</h1>
<p class="text-zen-accent font-medium text-sm">Take a pause. Be happy.</p>
</div>
<div class="w-full max-w-sm space-y-6 flex-1 flex flex-col justify-center">
<div class="space-y-4">
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-zen-accent ml-1">Email</label>
<div class="relative group">
<input class="w-full h-14 bg-[#444148] border-none rounded-xl px-4 text-zen-text placeholder:text-zen-accent/50 focus:ring-2 focus:ring-primary-sage/50 transition-all duration-300" placeholder="hello@happypause.com" type="email"/>
</div>
</div>
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-zen-accent ml-1">Password</label>
<div class="relative flex items-center">
<input class="w-full h-14 bg-[#444148] border-none rounded-xl px-4 text-zen-text placeholder:text-zen-accent/50 focus:ring-2 focus:ring-primary-sage/50 transition-all duration-300" placeholder="••••••••" type="password"/>
<button class="absolute right-4 text-zen-accent hover:text-vibrant-green transition-colors">
<span class="material-symbols-outlined text-xl">visibility</span>
</button>
</div>
<div class="flex justify-end">
<button class="text-xs font-semibold text-vibrant-green hover:brightness-110 transition-colors">Forgot Password?</button>
</div>
</div>
</div>
<button class="w-full h-14 bg-primary-sage text-[#36333a] font-bold text-lg rounded-xl shadow-lg shadow-black/20 hover:opacity-90 active:scale-[0.98] transition-all tracking-wide">
            Login
        </button>
<div class="flex items-center gap-4 py-2">
<div class="h-[1px] flex-1 bg-zen-accent/20"></div>
<span class="text-xs font-bold text-zen-accent/60 uppercase tracking-widest">OR</span>
<div class="h-[1px] flex-1 bg-zen-accent/20"></div>
</div>
<div class="grid grid-cols-1 gap-3">
<button class="flex items-center justify-center gap-3 w-full h-12 bg-white text-[#3c4043] font-medium border border-[#dadce0] rounded-md hover:shadow-md transition-shadow px-4">
<svg class="w-5 h-5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
<span class="text-sm font-['Roboto',sans-serif]">Continue with Google</span>
</button>
<button class="flex items-center justify-center gap-3 w-full h-12 bg-black text-white font-medium rounded-md hover:bg-zinc-900 transition-colors px-4">
<svg class="w-5 h-5 fill-current" viewBox="0 0 384 512" xmlns="http://www.w3.org/2000/svg">
<path d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141.2 4 184.8 4 273.5q0 39.3 14.4 81.2c12.8 36.7 59 126.7 107.2 125.2 25.2-.6 43-17.9 75.8-17.9 31.8 0 48.3 17.9 76.4 17.9 48.6-.7 90.4-82.5 102.6-119.3-65.2-30.7-61.7-90-61.7-91.9zm-56.6-164.2c27.3-32.4 24.8-61.9 24-72.5-24.1 1.4-52 16.4-67.9 34.9-17.5 19.8-27.8 44.3-25.6 71.9 26.1 2 49.9-11.4 69.5-34.3z"></path>
</svg>
<span class="text-sm font-[-apple-system,BlinkMacSystemFont,sans-serif]">Continue with Apple</span>
</button>
</div>
</div>
<div class="w-full max-w-sm pt-8 pb-4">
<div class="h-[1px] w-full bg-zen-accent/10 mb-6"></div>
<div class="text-center">
<p class="text-zen-accent text-sm">
                Don't have an account? 
                <button class="text-vibrant-green font-bold ml-1 hover:underline">Sign Up</button>
</p>
</div>
</div>
<div class="fixed top-[-10%] left-[-10%] w-64 h-64 bg-primary-sage/5 rounded-full blur-[80px] pointer-events-none"></div>
<div class="fixed bottom-[-5%] right-[-5%] w-80 h-80 bg-vibrant-green/5 rounded-full blur-[100px] pointer-events-none"></div>

</body></html>
